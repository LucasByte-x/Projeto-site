<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Clientes - Sebo Sistema</title>
  <link rel="stylesheet" href="../css/style.css/estillo.css">
</head>

<body>

<!-- MENU PADRÃO -->
<header class="topo">
  <h2>Sebo Sistema</h2>

  <div class="menu">
    <a href="principal.html">Home</a>
    <a href="acervo.html">Acervo</a>
    <a href="cadastro-livros.html">Cadastrar Livro</a>
    <a href="vendas.html">Vendas</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="clientes.html">Clientes</a>
    <a href="funcionarios.html">Funcionários</a>
    <a href="login.html" onclick="logout()">Sair</a>
  </div>
</header>

<!-- CONTEÚDO -->
<div class="container">

  <!-- CADASTRO -->
  <div class="card">
    <h2>👤 Cadastro de Clientes</h2>

    <input id="nome" placeholder="Nome do cliente"><br><br>
    <input id="email" placeholder="Email"><br><br>

    <button onclick="salvarCliente()">Salvar</button>

    <p id="msg"></p>
  </div>

  <!-- LISTA -->
  <div class="card">
    <h3>📋 Lista de Clientes</h3>
    <ul id="lista-clientes"></ul>
  </div>

</div>

<!-- FOOTER -->
<footer>
  <p>© 2026 Sebo Sistema</p>
</footer>

<!-- PROTEÇÃO LOGIN -->
<script src="js/auth.js"></script>

<!-- SCRIPT -->
<script>

// LOGOUT
function logout(){
  localStorage.removeItem("logado");
}

// SALVAR CLIENTE
function salvarCliente(){
  let nome = document.getElementById("nome").value;
  let email = document.getElementById("email").value;

  if(!nome || !email){
    msg.innerText = "Preencha todos os campos!";
    msg.style.color = "red";
    return;
  }

  let clientes = JSON.parse(localStorage.getItem("clientes")) || [];

  clientes.push({nome, email});

  localStorage.setItem("clientes", JSON.stringify(clientes));

  msg.innerText = "Cliente cadastrado!";
  msg.style.color = "green";

  document.getElementById("nome").value = "";
  document.getElementById("email").value = "";

  carregarClientes();
}

// CARREGAR CLIENTES
function carregarClientes(){
  let clientes = JSON.parse(localStorage.getItem("clientes")) || [];
  let lista = document.getElementById("lista-clientes");

  lista.innerHTML = "";

  clientes.forEach(c => {
    lista.innerHTML += `<li>${c.nome} - ${c.email}</li>`;
  });
}

carregarClientes();

</script>

</body>
</html>
